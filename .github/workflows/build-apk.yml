name: Build Cutiezy Agen APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Check project files
        run: |
          echo "Root files:"
          ls -la
          echo "App files:"
          ls -la app

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/app-debug.apk release-apk/Cutiezy-Agen-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cutiezy-Agen-debug-apk
          path: release-apk/Cutiezy-Agen-debug.apk
          if-no-files-found: error
